name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK Samostalno
      run: |
        mkdir -p bin classes
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        
        # Stvaranje čistog manifesta na sigurnoj lokaciji izvan bin mape kako bi se izbjegao 'Duplicate file'
        cat << 'EOF' > clean_manifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://android.com" package="com.helper.eightball">
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <application android:allowBackup="true" android:label="8Ball Helper" android:supportsRtl="true">
                <activity android:name="com.helper.eightball.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service android:name="com.helper.eightball.EightBallService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true">
                    <intent-filter>
                        <action android:name="android.accessibilityservice.AccessibilityService" />
                    </intent-filter>
                    <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />
                </service>
            </application>
        </manifest>
        EOF
        
        RES_PATH=$(find . -name "res" -type d | head -n 1)
        
        find . -name "*.java" > sources.txt
        javac --release 8 -d classes -classpath $ANDROID_SDK_ROOT/platforms/android-34/android.jar @sources.txt
        
        $ANDROID_SDK_ROOT/build-tools/34.0.0/d8 --release --lib $ANDROID_SDK_ROOT/platforms/android-34/android.jar --output bin classes/com/helper/eightball/*.class
        
        # Pakiranje resursa pomoću izdvojenog manifesta
        $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt package -f -M clean_manifest.xml -S $RES_PATH -I $ANDROID_SDK_ROOT/platforms/android-34/android.jar -F bin/8ballHelper-unsigned.apk bin/
        
        cp bin/8ballHelper-unsigned.apk bin/8ballHelper.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 8ballHelper-APK
        path: bin/8ballHelper.apk
