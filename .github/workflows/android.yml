name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK Bez Mape i Bez Gradle-a
      run: |
        set -ex
        
        # 1. Stvaranje mapa resursa i koda
        mkdir -p projekt/src/com/helper/eightball
        mkdir -p projekt/res/xml
        mkdir -p projekt/res/values
        mkdir -p projekt/bin
        
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        
        # Kopiranje tvog Java koda i XML konfiguracije
        cp $(find . -name "MainActivity.java") projekt/src/com/helper/eightball/
        cp $(find . -name "EightBallService.java") projekt/src/com/helper/eightball/
        cp $(find . -name "accessibility_service_config.xml") projekt/res/xml/
        
        # 2. GENERIRANJE MANIFESTA S ISPRAVNIM GOOGLE URL-om (ZAMPAKIRANO U JEDAN RED)
        echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://android.com" package="com.helper.eightball"><uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" /><application android:allowBackup="true" android:label="8Ball Helper" android:supportsRtl="true"><activity android:name="com.helper.eightball.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity><service android:name="com.helper.eightball.EightBallService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true"><intent-filter><action android:name="android.accessibilityservice.AccessibilityService" /></intent-filter><meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" /></service></application></manifest>' > projekt/AndroidManifest.xml
        
        # 3. Resursi aplikacije
        echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">8Ball Helper</string><string name="accessibility_service_description">Analiza kuteva u realnom vremenu.</string></resources>' > projekt/res/values/strings.xml
        
        # 4. Kompajliranje Jave
        javac --release 8 -d projekt/bin -classpath $ANDROID_SDK_ROOT/platforms/android-34/android.jar projekt/src/com/helper/eightball/*.java
        
        # 5. Generiranje classes.dex datoteke
        $ANDROID_SDK_ROOT/build-tools/34.0.0/d8 --release --lib $ANDROID_SDK_ROOT/platforms/android-34/android.jar --output projekt/bin projekt/bin/com/helper/eightball/*.class
        
        # 6. Pakiranje resursa
        $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt package -f -M projekt/AndroidManifest.xml -S projekt/res -I $ANDROID_SDK_ROOT/platforms/android-34/android.jar -F projekt/8ballHelper-unaligned.apk
        
        # 7. Dodavanje kompajliranog koda u APK paket
        cd projekt/bin && zip -g ../8ballHelper-unaligned.apk classes.dex && cd ../..
        
        # 8. Poravnanje APK datoteke
        $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -v -p 4 projekt/8ballHelper-unaligned.apk projekt/8ballHelper-aligned.apk
        
        # 9. Izrada ključa
        keytool -genkeypair -v -keystore projekt/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        
        # 10. Potpisivanje gotove aplikacije
        $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign --keystore projekt/debug.keystore --storepass android --keypass android --out projekt/8ballHelper.apk projekt/8ballHelper-aligned.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 8ballHelper-APK
        path: projekt/8ballHelper.apk
