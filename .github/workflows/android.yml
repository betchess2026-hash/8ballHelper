name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK Bez Mape i Bez Gradle-a
      run: |
        set -ex
        
        mkdir -p projekt/src projekt/res/xml projekt/bin
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        
        cp $(find . -name "MainActivity.java") projekt/src/
        cp $(find . -name "EightBallService.java") projekt/src/
        cp $(find . -name "accessibility_service_config.xml") projekt/res/xml/
        
        # 1. Kopiramo postojeći manifest s tvog repozitorija
        cp $(find . -name "AndroidManifest.xml" | head -n 1) projekt/AndroidManifest.xml
        
        # 2. Linux naredbom u hodu mijenjamo krivi 'http://android.com' u ispravan Android schemas URL
        sed -i 's|http://android.com|http://android.com|g' projekt/AndroidManifest.xml
        
        # Kompajliranje Java koda
        javac --release 8 -d projekt/bin -classpath $ANDROID_SDK_ROOT/platforms/android-34/android.jar projekt/src/*.java
        
        # Pretvaranje u DEX format
        $ANDROID_SDK_ROOT/build-tools/34.0.0/d8 --release --lib $ANDROID_SDK_ROOT/platforms/android-34/android.jar --output projekt/bin projekt/bin/com/helper/eightball/*.class
        
        # Pakiranje resursa s važećim manifestom
        $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt package -f -M projekt/AndroidManifest.xml -S projekt/res -I $ANDROID_SDK_ROOT/platforms/android-34/android.jar -F projekt/8ballHelper-unaligned.apk projekt/bin
        
        # Poravnanje APK datoteke (Zipalign)
        $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -v -p 4 projekt/8ballHelper-unaligned.apk projekt/8ballHelper-aligned.apk
        
        # Generiranje keystore ključa za potpisivanje aplikacije
        keytool -genkeypair -v -keystore projekt/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        
        # Potpisivanje APK-a pomoću apksigner-a
        $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign --keystore projekt/debug.keystore --storepass android --keypass android --out projekt/8ballHelper.apk projekt/8ballHelper-aligned.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 8ballHelper-APK
        path: projekt/8ballHelper.apk
