name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK Bez Mape i Bez Gradle-a
      run: |
        # Uključujemo detaljno praćenje i trenutni prekid na prvoj grešci
        set -ex
        
        mkdir -p projekt/src projekt/res/xml projekt/bin
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        
        cp $(find . -name "MainActivity.java") projekt/src/
        cp $(find . -name "EightBallService.java") projekt/src/
        cp $(find . -name "accessibility_service_config.xml") projekt/res/xml/
        
        echo '<?xml version="1.0" encoding="utf-8"?>' > projekt/AndroidManifest.xml
        echo '<manifest xmlns:android="http://android.com" package="com.helper.eightball">' >> projekt/AndroidManifest.xml
        echo '    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />' >> projekt/AndroidManifest.xml
        echo '    <application android:allowBackup="true" android:label="8Ball Helper" android:supportsRtl="true">' >> projekt/AndroidManifest.xml
        echo '        <activity android:name="com.helper.eightball.MainActivity" android:exported="true">' >> projekt/AndroidManifest.xml
        echo '            <intent-filter>' >> projekt/AndroidManifest.xml
        echo '                <action android:name="android.intent.action.MAIN" />' >> projekt/AndroidManifest.xml
        echo '                <category android:name="android.intent.category.LAUNCHER" />' >> projekt/AndroidManifest.xml
        echo '            </intent-filter>' >> projekt/AndroidManifest.xml
        echo '        </activity>' >> projekt/AndroidManifest.xml
        echo '        <service android:name="com.helper.eightball.EightBallService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true">' >> projekt/AndroidManifest.xml
        echo '            <intent-filter>' >> projekt/AndroidManifest.xml
        echo '                <action android:name="android.accessibilityservice.AccessibilityService" />' >> projekt/AndroidManifest.xml
        echo '            </intent-filter>' >> projekt/AndroidManifest.xml
        echo '            <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />' >> projekt/AndroidManifest.xml
        echo '        </service>' >> projekt/AndroidManifest.xml
        echo '    </application>' >> projekt/AndroidManifest.xml
        echo '</manifest>' >> projekt/AndroidManifest.xml
        
        javac --release 8 -d projekt/bin -classpath $ANDROID_SDK_ROOT/platforms/android-34/android.jar projekt/src/*.java
        
        $ANDROID_SDK_ROOT/build-tools/34.0.0/d8 --release --lib $ANDROID_SDK_ROOT/platforms/android-34/android.jar --output projekt/bin projekt/bin/com/helper/eightball/*.class
        
        $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt package -f -M projekt/AndroidManifest.xml -S projekt/res -I $ANDROID_SDK_ROOT/platforms/android-34/android.jar -F projekt/8ballHelper-unaligned.apk projekt/bin
        
        $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -v -p 4 projekt/8ballHelper-unaligned.apk projekt/8ballHelper-aligned.apk
        
        keytool -genkeypair -v -keystore projekt/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        
        $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign --keystore projekt/debug.keystore --storepass android --keypass android --out projekt/8ballHelper.apk projekt/8ballHelper-aligned.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 8ballHelper-APK
        path: projekt/8ballHelper.apk
