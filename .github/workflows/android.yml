        # Stvaramo privremeni manifest s privremenim oznakama 'XYZ' kako bismo zaobišli bug s dvotočkom
        cat << 'EOF' > projekt/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:XYZ="http://schemas.android.com/apk/res/android" package="com.helper.eightball">
            <uses-permission XYZ:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <application XYZ:allowBackup="true" XYZ:label="8Ball Helper" XYZ:supportsRtl="true">
                <activity XYZ:name="com.helper.eightball.MainActivity" XYZ:exported="true">
                    <intent-filter>
                        <action XYZ:name="android.intent.action.MAIN" />
                        <category XYZ:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service XYZ:name="com.helper.eightball.EightBallService" XYZ:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" XYZ:exported="true">
                    <intent-filter>
                        <action XYZ:name="android.accessibilityservice.AccessibilityService" />
                    </intent-filter>
                    <meta-data XYZ:name="android.accessibilityservice" XYZ:resource="@xml/accessibility_service_config" />
                </service>
            </application>
        </manifest>
        EOF
