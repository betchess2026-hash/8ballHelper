name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK Samostalno
      run: |
        mkdir -p bin classes
        # Definiranje fiksne i sigurne staze do Android SDK-a na poslužitelju
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        
        # Pronalaženje svih Java datoteka u projektu
        find . -name "*.java" > sources.txt
        
        # Kompajliranje s eksplicitno definiranom stazom do android.jar datoteke
        javac --release 8 -d classes -classpath $ANDROID_SDK_ROOT/platforms/android-34/android.jar @sources.txt
        
        # Pretvaranje kompajliranih klasa u Android dex format pomoću d8 alata
        $ANDROID_SDK_ROOT/build-tools/34.0.0/d8 --release --output bin/classes.dex $(find classes -name "*.class")
        
        # Pronalaženje točne lokacije manifesta i resursa te pakiranje u finalni APK
        MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | head -n 1)
        RES_PATH=$(find . -name "res" -type d | head -n 1)
        
        $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt package -f -M $MANIFEST_PATH -S $RES_PATH -I $ANDROID_SDK_ROOT/platforms/android-34/android.jar -F bin/8ballHelper-unsigned.apk bin/
        
        # Kopiranje zapakiranog APK-a u konačni format spremne instalacije
        cp bin/8ballHelper-unsigned.apk bin/8ballHelper.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 8ballHelper-APK
        path: bin/8ballHelper.apk
