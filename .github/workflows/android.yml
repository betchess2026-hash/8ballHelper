name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK Bez Mape i Bez Gradle-a
      run: |
        mkdir -p projekt/src projekt/res/xml projekt/bin
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        
        cp $(find . -name "MainActivity.java") projekt/src/
        cp $(find . -name "EightBallService.java") projekt/src/
        cp $(find . -name "accessibility_service_config.xml") projekt/res/xml/
        
        # Zapisujemo čist i ispravan AndroidManifest u jednom retku kako bismo izbjegli YAML parsiranje dvotočke
        echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.helper.eightball"><uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" /><application android:allowBackup="true" android:label="8Ball Helper" android:supportsRtl="true"><activity android:name="com.helper.eightball.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity><service android:name="com.helper.eightball.EightBallService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true"><intent-filter><action android:name="android.accessibilityservice.AccessibilityService" /></intent-filter><meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" /></service></application></manifest>' > projekt/AndroidManifest.xml
        
        javac --release 8 -d projekt/bin -classpath $ANDROID_SDK_ROOT/platforms/android-34/android.jar projekt/src/*.java
        
        $ANDROID_SDK_ROOT/build-tools/34.0.0/d8 --release --lib $ANDROID_SDK_ROOT/platforms/android-34/android.jar --output projekt/bin projekt/bin/com/helper/eightball/*.class
        
        # Pakiranje resursa s važećim manifestom
        $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt package -f -M projekt/AndroidManifest.xml -S projekt/res -I $ANDROID_SDK_ROOT/platforms/android-34/android.jar -F projekt/8ballHelper-unsigned.apk projekt/bin
        
        cp projekt/8ballHelper-unsigned.apk projekt/8ballHelper.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 8ballHelper-APK
        path: projekt/8ballHelper.apk
