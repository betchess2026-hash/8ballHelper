name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK Samostalno
      run: |
        mkdir -p bin classes
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        
        MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | head -n 1)
        RES_PATH=$(find . -name "res" -type d | head -n 1)
        
        find . -name "*.java" > sources.txt
        javac --release 8 -d classes -classpath $ANDROID_SDK_ROOT/platforms/android-34/android.jar @sources.txt
        
        # Dodan parametar --lib koji alatu d8 daje pristup Android platformi i rješava grešku 'was not found'
        $ANDROID_SDK_ROOT/build-tools/34.0.0/d8 --release --lib $ANDROID_SDK_ROOT/platforms/android-34/android.jar --output bin classes/com/helper/eightball/*.class
        
        $ANDROID_SDK_ROOT/build-tools/34.0.0/aapt package -f -M $MANIFEST_PATH -S $RES_PATH -I $ANDROID_SDK_ROOT/platforms/android-34/android.jar -F bin/8ballHelper-unsigned.apk bin/
        
        cp bin/8ballHelper-unsigned.apk bin/8ballHelper.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 8ballHelper-APK
        path: bin/8ballHelper.apk
