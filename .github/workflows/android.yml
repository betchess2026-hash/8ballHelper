name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK Samostalno
      run: |
        mkdir -p bin classes
        # Traženje svih Java datoteka u projektu
        find . -name "*.java" > sources.txt
        
        # Kompajliranje prilagođeno za Javu 17 i Android platformu 30
        javac --release 8 -d classes -classpath $ANDROID_HOME/platforms/android-30/android.jar @sources.txt
        
        # Pretvaranje u Android dex format pomoću d8 alata
        $ANDROID_HOME/build-tools/30.0.3/d8 --release --output bin/classes.dex $(find classes -name "*.class")
        
        # Pronalaženje točne lokacije manifesta i resursa te pakiranje u APK
        MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | head -n 1)
        RES_PATH=$(find . -name "res" -type d | head -n 1)
        
        $ANDROID_HOME/build-tools/30.0.3/aapt package -f -M $MANIFEST_PATH -S $RES_PATH -I $ANDROID_HOME/platforms/android-30/android.jar -F bin/8ballHelper-unsigned.apk bin/
        
        # Kopiranje nepotpisanog APK-a u finalni format (apksigner se preskače radi stabilnosti)
        cp bin/8ballHelper-unsigned.apk bin/8ballHelper.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 8ballHelper-APK
        path: bin/8ballHelper.apk
